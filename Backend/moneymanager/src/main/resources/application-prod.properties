# ============================================
# Money Manager - PRODUCTION Configuration
# ============================================
# All values MUST come from environment variables. No sensitive defaults here.

# ============================================
# Database
# ============================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:10}

# ============================================
# JPA ? Production
# ============================================
# Use 'update' for first deploy (creates tables), then change to 'validate'
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# ============================================
# Logging ? Production
# ============================================
logging.level.root=WARN
logging.level.in.bushansirgur.moneymanager=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR
logging.level.org.springframework.security=WARN

# ============================================
# Server ? Production
# ============================================
server.port=${SERVER_PORT:8081}
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ============================================
# Email (SMTP fallback ? Brevo API is preferred on Render)
# ============================================
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:notused}
spring.mail.password=${MAIL_PASSWORD:notused}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.smtp.from=${MAIL_FROM:noreply@moneymanager.app}

# ============================================
# JWT ? Production
# ============================================
# REQUIRED ? no fallback. App will not start without JWT_SECRET set.
# FIXED: was 'default-secret-change-in-production-immediately' which is insecure
# and would silently work in production if you forgot to set the env var.
jwt.secret=${JWT_SECRET}
jwt.expiration.hours=${JWT_EXPIRATION_HOURS:10}

# ============================================
# CORS ? Production
# ============================================
# FIXED: was defaulting to '*' (wildcard).
# Two problems with wildcard CORS:
#   1. Browsers reject credentialed requests (allowCredentials=true + '*' = rejected)
#      meaning the entire frontend stops working if CORS_ALLOWED_ORIGINS is unset
#   2. Any website could make authenticated requests to the API
# Default is now the actual deployed frontend URL.
# Set CORS_ALLOWED_ORIGINS env var to your real Vercel/Render frontend URL.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://money-manager-project-peach.vercel.app}

# ============================================
# Application URLs ? Production
# ============================================
money.manager.frontend.url=${FRONTEND_URL:https://money-manager-project-peach.vercel.app}
app.activation.url=${ACTIVATION_BASE_URL:https://money-manager-project-peach.vercel.app}

# ============================================
# Brevo HTTP API ? Production (REQUIRED on Render, SMTP port 587 is blocked)
# ============================================
email.use.api=${EMAIL_USE_API:true}
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:}
brevo.sender.name=${BREVO_SENDER_NAME:Money Manager}